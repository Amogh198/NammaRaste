<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contractor Login — BBMP</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --amber: #f59e0b;
      --text: #e5e5e5;
      --muted: #6b7280;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; }
    
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--amber); letter-spacing: 2px; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.85rem;
      font-family: 'DM Mono', monospace; letter-spacing: 1px;
    }
    .nav-links a:hover { color: var(--amber); }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      border-radius: 4px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--amber);
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .login-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }
    .form-group { margin-bottom: 1.5rem; }
    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    input {
      width: 100%;
      background: #1f1f1f;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.8rem;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--amber); }
    
    .login-btn {
      width: 100%;
      background: var(--amber);
      color: #000;
      border: none;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 3px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    
    .error-msg {
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">⚠ POTHOLE WATCH</div>
  <div class="nav-links">
    <a href="index.html">BACK TO HOME</a>
  </div>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="login-title">CONTRACTOR LOGIN</div>
    <div class="login-sub">// Access assigned repair works</div>
    
    <div class="form-group">
      <label>CONTRACTOR NAME</label>
      <input type="text" id="name" placeholder="Enter your full name" />
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    
    <button class="login-btn" onclick="login()">LOGIN →</button>
    <div class="error-msg" id="error">Invalid credentials. Please try again.</div>
  </div>
</div>

<script>
  async function login() {
    const name = document.getElementById('name').value;
    const password = document.getElementById('password').value;
    const error = document.getElementById('error');
    
    error.style.display = 'none';
    
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password })
    });
    
    const data = await res.json();
    
    if (data.success) {
      localStorage.setItem('contractor', JSON.stringify(data.user));
      window.location.href = 'contractor.html';
    } else {
      error.textContent = data.error || 'Login failed';
      error.style.display = 'block';
    }
  }
</script>

</body>
</html>
